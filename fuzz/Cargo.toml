[package]
name = "frankentorch-fuzz"
version = "0.0.0"
publish = false
edition = "2024"

[package.metadata]
cargo-fuzz = true

[dependencies]
ft-core = { path = "../crates/ft-core" }
ft-dispatch = { path = "../crates/ft-dispatch" }
