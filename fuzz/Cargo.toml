test = false
doc = false
bench = false

[[bin]]
name = "ft_core_sparse_tensors"
path = "fuzz_targets/ft_core_sparse_tensors.rs"
test = false
doc = false
bench = false

[[bin]]
name = "ft_serialize_checkpoint"
path = "fuzz_targets/ft_serialize_checkpoint.rs"
test = false
doc = false
bench = false

[[bin]]
name = "ft_serialize_raptorq_sidecar"
